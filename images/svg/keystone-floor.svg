<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Courier New', monospace" fill="none" stroke="#c7622a" stroke-width="1">
  <title>2017 Keystone Bullet Ultra Lite 248RKS — Floor Plan</title>
  <rect width="800" height="400" fill="#1a1a1a"/>
  <text x="400" y="25" text-anchor="middle" fill="#f5f0e8" font-size="13" font-weight="bold" stroke="none">KEYSTONE BULLET 248RKS — FLOOR PLAN VIEW</text>

  <g transform="translate(40,45)">
    <!-- Outer wall -->
    <rect x="20" y="20" width="660" height="200" rx="6" stroke="#c7622a" stroke-width="2"/>
    <!-- A-frame tongue -->
    <path d="M680,100 L720,110 L720,130 L680,140" stroke="#c7622a" stroke-width="1.5"/>

    <!-- Room dividers -->
    <!-- Kitchen / Bath wall -->
    <line x1="220" y1="20" x2="220" y2="220" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Bath / Living wall -->
    <line x1="300" y1="20" x2="300" y2="150" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Entry door gap -->
    <line x1="300" y1="170" x2="300" y2="220" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Living / Bedroom wall -->
    <line x1="520" y1="20" x2="520" y2="220" stroke="#c7622a" stroke-width="1.5"/>

    <!-- Entry door -->
    <rect x="285" y="210" width="45" height="15" rx="2" stroke="#3d5a3e" stroke-width="1.5" fill="rgba(61,90,62,0.15)"/>
    <text x="307" y="232" text-anchor="middle" fill="#3d5a3e" font-size="7" stroke="none">ENTRY</text>

    <!-- Slide-out (Living area) -->
    <rect x="350" y="0" width="150" height="25" rx="2" stroke="#c7622a" stroke-width="1" stroke-dasharray="4,2" fill="rgba(199,98,42,0.08)"/>
    <text x="425" y="16" text-anchor="middle" fill="#c7622a" font-size="8" stroke="none">SLIDE-OUT</text>

    <!-- === ROOM LABELS === -->
    <!-- Kitchen -->
    <rect x="40" y="40" width="160" height="160" rx="4" stroke="none" fill="rgba(199,98,42,0.06)"/>
    <text x="120" y="100" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold" stroke="none">KITCHEN</text>
    <text x="120" y="115" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">Counter ~96"</text>
    <text x="120" y="127" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">Fridge | Stove | Sink</text>
    <!-- Counter along rear wall -->
    <rect x="30" y="30" width="180" height="20" rx="2" stroke="#d4c5a9" stroke-width="0.8" fill="rgba(212,197,169,0.1)"/>

    <!-- Bathroom -->
    <rect x="230" y="30" width="60" height="120" rx="4" stroke="none" fill="rgba(61,90,62,0.06)"/>
    <text x="260" y="85" text-anchor="middle" fill="#f5f0e8" font-size="10" font-weight="bold" stroke="none">BATH</text>
    <text x="260" y="100" text-anchor="middle" fill="#d4c5a9" font-size="7" stroke="none">~36" WIDE</text>
    <!-- Toilet -->
    <circle cx="250" cy="55" r="8" stroke="#d4c5a9" stroke-width="0.5"/>
    <!-- Shower -->
    <rect x="260" y="40" width="25" height="25" rx="2" stroke="#d4c5a9" stroke-width="0.5"/>

    <!-- Living Area -->
    <rect x="310" y="30" width="200" height="180" rx="4" stroke="none" fill="rgba(199,98,42,0.04)"/>
    <text x="410" y="95" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold" stroke="none">LIVING</text>
    <text x="410" y="110" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">Sofa (converts to bed)</text>
    <text x="410" y="122" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">Dinette | TV</text>
    <!-- Sofa -->
    <rect x="350" y="35" width="120" height="30" rx="3" stroke="#d4c5a9" stroke-width="0.8" fill="rgba(212,197,169,0.08)"/>
    <text x="410" y="55" text-anchor="middle" fill="#555" font-size="7" stroke="none">SOFA</text>

    <!-- Bedroom -->
    <rect x="530" y="30" width="140" height="180" rx="4" stroke="none" fill="rgba(61,90,62,0.04)"/>
    <text x="600" y="95" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold" stroke="none">BEDROOM</text>
    <text x="600" y="110" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">Queen Bed</text>
    <text x="600" y="122" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">60" x 80"</text>
    <!-- Bed outline -->
    <rect x="545" y="50" width="110" height="130" rx="4" stroke="#d4c5a9" stroke-width="0.8" fill="rgba(212,197,169,0.06)"/>
    <text x="600" y="150" text-anchor="middle" fill="#555" font-size="7" stroke="none">QUEEN BED</text>

    <!-- === DIMENSION LINES === -->

    <!-- Overall interior length -->
    <line x1="20" y1="260" x2="680" y2="260" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="20,260 28,257 28,263" fill="#f5f0e8" stroke="none"/>
    <polygon points="680,260 672,257 672,263" fill="#f5f0e8" stroke="none"/>
    <line x1="20" y1="225" x2="20" y2="265" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="680" y1="225" x2="680" y2="265" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="350" y="278" text-anchor="middle" fill="#f5f0e8" font-size="10" stroke="none">28' 9" OVERALL | INTERIOR: ~24' USABLE</text>

    <!-- Width -->
    <line x1="735" y1="20" x2="735" y2="220" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="735,20 732,28 738,28" fill="#f5f0e8" stroke="none"/>
    <polygon points="735,220 732,212 738,212" fill="#f5f0e8" stroke="none"/>
    <line x1="685" y1="20" x2="740" y2="20" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="685" y1="220" x2="740" y2="220" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="745" y="125" fill="#f5f0e8" font-size="9" stroke="none" transform="rotate(90,745,125)">8' 0" WIDTH</text>

    <!-- Kitchen width -->
    <line x1="30" y1="240" x2="218" y2="240" stroke="#d4c5a9" stroke-width="0.7"/>
    <polygon points="30,240 38,237 38,243" fill="#d4c5a9" stroke="none"/>
    <polygon points="218,240 210,237 210,243" fill="#d4c5a9" stroke="none"/>
    <text x="124" y="252" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">~15' 8" KITCHEN</text>

    <!-- Bedroom width -->
    <line x1="522" y1="240" x2="678" y2="240" stroke="#d4c5a9" stroke-width="0.7"/>
    <polygon points="522,240 530,237 530,243" fill="#d4c5a9" stroke="none"/>
    <polygon points="678,240 670,237 670,243" fill="#d4c5a9" stroke="none"/>
    <text x="600" y="252" text-anchor="middle" fill="#d4c5a9" font-size="8" stroke="none">~11' BEDROOM</text>
  </g>

  <g transform="translate(20,370)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f5f0e8" stroke-width="1"/>
    <text x="25" y="4" fill="#f5f0e8" font-size="9" stroke="none">Overall</text>
    <line x1="90" y1="0" x2="110" y2="0" stroke="#d4c5a9" stroke-width="1"/>
    <text x="115" y="4" fill="#d4c5a9" font-size="9" stroke="none">Room Dims</text>
    <line x1="200" y1="0" x2="220" y2="0" stroke="#3d5a3e" stroke-width="1"/>
    <text x="225" y="4" fill="#3d5a3e" font-size="9" stroke="none">Access</text>
    <text x="400" y="4" fill="#555" font-size="8" stroke="none">Floor plan approximate. Slide-out shown retracted. Interior height: 6' 6".</text>
  </g>
</svg>
