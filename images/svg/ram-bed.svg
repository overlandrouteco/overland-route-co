<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="'Courier New', monospace" fill="none" stroke="#c7622a" stroke-width="1">
  <title>2022 Ram 1500 Rebel 4x4 — Bed Top View</title>
  <rect width="500" height="400" fill="#1a1a1a"/>
  <text x="250" y="28" text-anchor="middle" fill="#f5f0e8" font-size="13" font-weight="bold" stroke="none">RAM 1500 REBEL — BED TOP VIEW</text>

  <g transform="translate(100,50)">
    <!-- Bed outline (top view) -->
    <rect x="30" y="20" width="240" height="220" rx="4" stroke="#c7622a" stroke-width="2"/>
    <!-- Wheel wells -->
    <rect x="30" y="170" width="40" height="70" rx="8" stroke="#c7622a" stroke-width="1.5" fill="rgba(199,98,42,0.1)"/>
    <rect x="230" y="170" width="40" height="70" rx="8" stroke="#c7622a" stroke-width="1.5" fill="rgba(199,98,42,0.1)"/>
    <!-- Tailgate -->
    <line x1="30" y1="20" x2="270" y2="20" stroke="#c7622a" stroke-width="2.5"/>
    <text x="150" y="16" text-anchor="middle" fill="#555" font-size="8" stroke="none">TAILGATE</text>
    <!-- Cab wall -->
    <line x1="30" y1="240" x2="270" y2="240" stroke="#c7622a" stroke-width="2.5"/>
    <text x="150" y="254" text-anchor="middle" fill="#555" font-size="8" stroke="none">CAB</text>

    <!-- === DIMENSIONS === -->

    <!-- Bed Length: 67.4" -->
    <line x1="290" y1="20" x2="290" y2="240" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="290,20 287,28 293,28" fill="#f5f0e8" stroke="none"/>
    <polygon points="290,240 287,232 293,232" fill="#f5f0e8" stroke="none"/>
    <text x="300" y="135" fill="#f5f0e8" font-size="10" stroke="none" transform="rotate(90,300,135)">67.4" BED LENGTH</text>

    <!-- Width at floor: 51" (between wheel wells) -->
    <line x1="70" y1="200" x2="230" y2="200" stroke="#3d5a3e" stroke-width="0.8"/>
    <polygon points="70,200 78,197 78,203" fill="#3d5a3e" stroke="none"/>
    <polygon points="230,200 222,197 222,203" fill="#3d5a3e" stroke="none"/>
    <text x="150" y="195" text-anchor="middle" fill="#3d5a3e" font-size="9" stroke="none">51" BETWEEN WELLS</text>

    <!-- Width wall-to-wall at top -->
    <line x1="30" y1="280" x2="270" y2="280" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="30,280 38,277 38,283" fill="#f5f0e8" stroke="none"/>
    <polygon points="270,280 262,277 262,283" fill="#f5f0e8" stroke="none"/>
    <line x1="30" y1="245" x2="30" y2="285" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="270" y1="245" x2="270" y2="285" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="150" y="296" text-anchor="middle" fill="#f5f0e8" font-size="10" stroke="none">66.4" WALL-TO-WALL</text>

    <!-- Depth callout -->
    <text x="150" y="130" text-anchor="middle" fill="#d4c5a9" font-size="10" stroke="none">DEPTH: 19.9"</text>
    <text x="150" y="144" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">VOLUME: 53.9 cu ft</text>
  </g>

  <g transform="translate(20,370)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f5f0e8" stroke-width="1"/>
    <text x="25" y="4" fill="#f5f0e8" font-size="9" stroke="none">Overall</text>
    <line x1="100" y1="0" x2="120" y2="0" stroke="#3d5a3e" stroke-width="1"/>
    <text x="125" y="4" fill="#3d5a3e" font-size="9" stroke="none">Usable Width</text>
    <text x="300" y="4" fill="#555" font-size="8" stroke="none">All dimensions approximate.</text>
  </g>
</svg>
