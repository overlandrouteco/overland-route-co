<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" font-family="'Courier New', monospace" fill="none" stroke="#c7622a" stroke-width="1">
  <title>2022 Mercedes-Benz Sprinter 4x4 — Rear View Dimensions</title>
  <rect width="500" height="450" fill="#1a1a1a"/>
  <text x="250" y="28" text-anchor="middle" fill="#f5f0e8" font-size="13" font-weight="bold" stroke="none">SPRINTER 4x4 144" WB — REAR VIEW</text>

  <g transform="translate(100,50)">
    <!-- Rear body outline -->
    <rect x="30" y="10" width="240" height="250" rx="8" stroke="#c7622a" stroke-width="2"/>
    <!-- Roof -->
    <line x1="30" y1="10" x2="270" y2="10" stroke="#c7622a" stroke-width="2.5"/>
    <!-- Rear doors (double) -->
    <line x1="150" y1="30" x2="150" y2="255" stroke="#c7622a" stroke-width="1.5"/>
    <rect x="55" y="30" width="190" height="225" rx="3" stroke="#c7622a" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Bumper -->
    <rect x="20" y="260" width="260" height="15" rx="2" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Wheels -->
    <rect x="10" y="275" width="40" height="50" rx="6" stroke="#c7622a" stroke-width="1.5"/>
    <rect x="250" y="275" width="40" height="50" rx="6" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Ground -->
    <line x1="-10" y1="325" x2="310" y2="325" stroke="#555" stroke-width="0.5" stroke-dasharray="6,3"/>

    <!-- === DIMENSIONS === -->

    <!-- Overall Width: 79.1" -->
    <line x1="10" y1="360" x2="290" y2="360" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="10,360 18,357 18,363" fill="#f5f0e8" stroke="none"/>
    <polygon points="290,360 282,357 282,363" fill="#f5f0e8" stroke="none"/>
    <line x1="10" y1="330" x2="10" y2="365" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="290" y1="330" x2="290" y2="365" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="150" y="378" text-anchor="middle" fill="#f5f0e8" font-size="11" stroke="none">79.1" (OVERALL WIDTH)</text>

    <!-- Cargo Width: 70.1" (interior) -->
    <line x1="40" y1="140" x2="260" y2="140" stroke="#3d5a3e" stroke-width="0.8"/>
    <polygon points="40,140 48,137 48,143" fill="#3d5a3e" stroke="none"/>
    <polygon points="260,140 252,137 252,143" fill="#3d5a3e" stroke="none"/>
    <text x="150" y="135" text-anchor="middle" fill="#3d5a3e" font-size="10" stroke="none">70.1" CARGO WIDTH</text>

    <!-- Cargo Height: 78.7" -->
    <line x1="285" y1="20" x2="285" y2="255" stroke="#3d5a3e" stroke-width="0.8"/>
    <polygon points="285,20 282,28 288,28" fill="#3d5a3e" stroke="none"/>
    <polygon points="285,255 282,247 288,247" fill="#3d5a3e" stroke="none"/>
    <text x="295" y="140" fill="#3d5a3e" font-size="9" stroke="none" transform="rotate(90,295,140)">78.7" CARGO HT</text>

    <!-- Rear Door Opening: 73.5" H x 61" W -->
    <line x1="55" y1="30" x2="55" y2="255" stroke="#d4c5a9" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="15" y="150" fill="#d4c5a9" font-size="8" stroke="none" transform="rotate(-90,20,150)">73.5" DOOR HT</text>
    <line x1="55" y1="245" x2="245" y2="245" stroke="#d4c5a9" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="150" y="238" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">61" DOOR WIDTH</text>
  </g>

  <g transform="translate(20,420)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f5f0e8" stroke-width="1"/>
    <text x="25" y="4" fill="#f5f0e8" font-size="9" stroke="none">Exterior</text>
    <line x1="100" y1="0" x2="120" y2="0" stroke="#d4c5a9" stroke-width="1"/>
    <text x="125" y="4" fill="#d4c5a9" font-size="9" stroke="none">Door Opening</text>
    <line x1="230" y1="0" x2="250" y2="0" stroke="#3d5a3e" stroke-width="1"/>
    <text x="255" y="4" fill="#3d5a3e" font-size="9" stroke="none">Cargo Interior</text>
  </g>
</svg>
