<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Courier New', monospace" fill="none" stroke="#c7622a" stroke-width="1">
  <title>2017 Keystone Bullet Ultra Lite 248RKS — Side View</title>
  <rect width="800" height="450" fill="#1a1a1a"/>
  <text x="400" y="28" text-anchor="middle" fill="#f5f0e8" font-size="14" font-weight="bold" stroke="none">2017 KEYSTONE BULLET ULTRA LITE 248RKS — SIDE VIEW</text>

  <g transform="translate(60,55)">
    <!-- Trailer body outline -->
    <rect x="30" y="30" width="580" height="200" rx="6" stroke="#c7622a" stroke-width="2"/>
    <!-- Roof (slightly curved) -->
    <path d="M30,30 Q320,15 610,30" stroke="#c7622a" stroke-width="2"/>
    <!-- A-frame tongue -->
    <path d="M610,230 L680,200 L690,200" stroke="#c7622a" stroke-width="2"/>
    <circle cx="695" cy="200" r="8" stroke="#c7622a" stroke-width="1.5"/>
    <!-- Entry door -->
    <rect x="350" y="80" width="45" height="148" rx="3" stroke="#c7622a" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- Windows -->
    <rect x="80" y="60" width="80" height="50" rx="4" stroke="#c7622a" stroke-width="1"/>
    <rect x="200" y="60" width="60" height="50" rx="4" stroke="#c7622a" stroke-width="1"/>
    <rect x="440" y="60" width="70" height="50" rx="4" stroke="#c7622a" stroke-width="1"/>
    <rect x="540" y="60" width="50" height="50" rx="4" stroke="#c7622a" stroke-width="1"/>
    <!-- Slide-out (extended) -->
    <rect x="420" y="50" width="120" height="180" stroke="#c7622a" stroke-width="1" stroke-dasharray="6,3" fill="rgba(199,98,42,0.05)"/>
    <text x="480" y="145" text-anchor="middle" fill="#555" font-size="8" stroke="none">SLIDE-OUT</text>
    <!-- Awning rail -->
    <line x1="100" y1="30" x2="350" y2="30" stroke="#c7622a" stroke-width="2.5"/>
    <!-- Wheels (tandem axle) -->
    <circle cx="220" cy="260" r="28" stroke="#c7622a" stroke-width="2"/>
    <circle cx="220" cy="260" r="10" stroke="#c7622a" stroke-width="1"/>
    <circle cx="310" cy="260" r="28" stroke="#c7622a" stroke-width="2"/>
    <circle cx="310" cy="260" r="10" stroke="#c7622a" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="-10" y1="288" x2="710" y2="288" stroke="#555" stroke-width="0.5" stroke-dasharray="6,3"/>
    <!-- Stabilizer jacks -->
    <line x1="60" y1="230" x2="60" y2="288" stroke="#c7622a" stroke-width="1.5"/>
    <line x1="560" y1="230" x2="560" y2="288" stroke="#c7622a" stroke-width="1.5"/>

    <!-- === DIMENSIONS === -->

    <!-- Overall Length: 28ft 9in -->
    <line x1="10" y1="330" x2="700" y2="330" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="10,330 18,327 18,333" fill="#f5f0e8" stroke="none"/>
    <polygon points="700,330 692,327 692,333" fill="#f5f0e8" stroke="none"/>
    <line x1="10" y1="295" x2="10" y2="335" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="700" y1="295" x2="700" y2="335" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="355" y="348" text-anchor="middle" fill="#f5f0e8" font-size="11" stroke="none">28' 9" (OVERALL LENGTH)</text>

    <!-- Height: 11ft 1in -->
    <line x1="720" y1="15" x2="720" y2="288" stroke="#f5f0e8" stroke-width="0.8"/>
    <polygon points="720,15 717,23 723,23" fill="#f5f0e8" stroke="none"/>
    <polygon points="720,288 717,280 723,280" fill="#f5f0e8" stroke="none"/>
    <line x1="615" y1="15" x2="725" y2="15" stroke="#f5f0e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="727" y="155" fill="#f5f0e8" font-size="10" stroke="none" transform="rotate(90,727,155)">11' 1" (HEIGHT)</text>

    <!-- Interior Height: 6ft 6in -->
    <line x1="150" y1="35" x2="150" y2="228" stroke="#3d5a3e" stroke-width="0.8"/>
    <polygon points="150,35 147,43 153,43" fill="#3d5a3e" stroke="none"/>
    <polygon points="150,228 147,220 153,220" fill="#3d5a3e" stroke="none"/>
    <text x="160" y="140" fill="#3d5a3e" font-size="9" stroke="none" transform="rotate(90,160,140)">6' 6" INT HEIGHT</text>

    <!-- Width: 8ft -->
    <text x="355" y="365" text-anchor="middle" fill="#d4c5a9" font-size="10" stroke="none">WIDTH: 8' 0" (96")</text>

    <!-- Entry door label -->
    <text x="372" y="160" text-anchor="middle" fill="#555" font-size="7" stroke="none">ENTRY</text>
    <text x="372" y="168" text-anchor="middle" fill="#555" font-size="7" stroke="none">DOOR</text>

    <!-- Room labels -->
    <text x="110" y="165" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">REAR</text>
    <text x="110" y="175" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">KITCHEN</text>
    <text x="265" y="165" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">BATH</text>
    <text x="480" y="165" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">LIVING</text>
    <text x="570" y="165" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">BED-</text>
    <text x="570" y="175" text-anchor="middle" fill="#d4c5a9" font-size="9" stroke="none">ROOM</text>
  </g>

  <g transform="translate(20,420)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f5f0e8" stroke-width="1"/>
    <text x="25" y="4" fill="#f5f0e8" font-size="9" stroke="none">Exterior</text>
    <line x1="100" y1="0" x2="120" y2="0" stroke="#3d5a3e" stroke-width="1"/>
    <text x="125" y="4" fill="#3d5a3e" font-size="9" stroke="none">Interior</text>
    <line x1="200" y1="0" x2="220" y2="0" stroke="#d4c5a9" stroke-width="1"/>
    <text x="225" y="4" fill="#d4c5a9" font-size="9" stroke="none">Layout</text>
    <text x="450" y="4" fill="#555" font-size="8" stroke="none">All dimensions approximate. Verify before modifications.</text>
  </g>
</svg>
